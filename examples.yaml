# examples.yaml — Exemples manuels (format OG tldr)
# Chaque commande : liste de {desc, cmd} paires
# Max 5 exemples par commande

setup:
  - desc: "Launch the first-time wizard:"
    cmd: "hermes setup"
  - desc: "Quick setup — only prompt for missing or unset items:"
    cmd: "hermes setup --quick"
  - desc: "Configure provider and model for the active profile:"
    cmd: "hermes setup model"
  - desc: "Configure agent behavior for the active profile:"
    cmd: "hermes setup agent"

auth:
  - desc: "Launch the interactive management wizard:"
    cmd: "hermes auth"
  - desc: "List all credential pools:"
    cmd: "hermes auth list"
  - desc: "Show credentials for a specific provider:"
    cmd: "hermes auth list {{provider}}"
  - desc: "Remove a credential by provider and index:"
    cmd: "hermes auth remove {{provider}} {{2}}"
  - desc: "Show auth status for a provider:"
    cmd: "hermes auth status {{provider}}"

secrets:
  - desc: "Run the Bitwarden setup wizard:"
    cmd: "hermes secrets bitwarden setup"
  - desc: "Show 1Password secrets status:"
    cmd: "hermes secrets 1password status"
  - desc: "Sync and apply secrets:"
    cmd: "hermes secrets bitwarden sync --apply"

status:
  - desc: "Show quick status:"
    cmd: "hermes status"
  - desc: "Show all details in shareable format:"
    cmd: "hermes status --all"
  - desc: "Run deeper diagnostic checks:"
    cmd: "hermes status --deep"

doctor:
  - desc: "Run diagnostics and show issues:"
    cmd: "hermes doctor"
  - desc: "Diagnose and attempt automatic fixes:"
    cmd: "hermes doctor --fix"

security:
  - desc: "Run supply-chain audit:"
    cmd: "hermes security audit"
  - desc: "Emit machine-readable JSON output:"
    cmd: "hermes security audit --json"
  - desc: "Fail on high-severity findings or above:"
    cmd: "hermes security audit --fail-on {{high}}"

backup:
  - desc: "Full backup to ~/hermes-backup-*.zip:"
    cmd: "hermes backup"
  - desc: "Full backup to specific path:"
    cmd: "hermes backup -o /tmp/hermes.zip"
  - desc: "Quick state-only snapshot:"
    cmd: "hermes backup --quick"
  - desc: "Quick snapshot with label:"
    cmd: "hermes backup --quick --label \"pre-upgrade\""

checkpoints:
  - desc: "Show status overview:"
    cmd: "hermes checkpoints"
  - desc: "Aggressive cleanup of old checkpoints:"
    cmd: "hermes checkpoints prune --retention-days 3"
  - desc: "Drop oldest commits until store size ≤ 200 MB:"
    cmd: "hermes checkpoints prune --max-size-mb 200"

import:
  - desc: "Restore a backup:"
    cmd: "hermes import ~/hermes-backup-20260423.zip"
  - desc: "Restore without confirmation prompt:"
    cmd: "hermes import ~/hermes-backup-20260423.zip --force"

portal:
  - desc: "Show Portal auth and tool gateway status:"
    cmd: "hermes portal"
  - desc: "Open subscription page in browser:"
    cmd: "hermes portal open"
  - desc: "List Tool Gateway partners and routing:"
    cmd: "hermes portal tools"

sessions:
  - desc: "Browse sessions interactively:"
    cmd: "hermes sessions browse"
  - desc: "Prune sessions older than 90 days (default):"
    cmd: "hermes sessions prune"
  - desc: "Prune sessions older than 30 days:"
    cmd: "hermes sessions prune --older-than {{30d}}"
  - desc: "Prune sessions newer than 8 hours:"
    cmd: "hermes sessions prune --newer-than {{8h}}"
  - desc: "List recent sessions:"
    cmd: "hermes sessions list"

dashboard:
  - desc: "Launch the web dashboard:"
    cmd: "hermes dashboard"
  - desc: "Stop the running dashboard:"
    cmd: "hermes dashboard --stop"
  - desc: "Show running dashboard processes:"
    cmd: "hermes dashboard --status"

version:
  - desc: "Show version:"
    cmd: "hermes version"

update:
  - desc: "Check for available update:"
    cmd: "hermes update --check"
  - desc: "Pull latest changes and reinstall:"
    cmd: "hermes update"
  - desc: "Update with pre-update backup:"
    cmd: "hermes update --backup"

chat:
  - desc: "One-shot, non-interactive prompt:"
    cmd: "hermes chat -q \"{{prompt}}\""
  - desc: "Override the model for the duration of this session:"
    cmd: "hermes chat -m {{model}}"
  - desc: "Force a provider for the duration of this session:"
    cmd: "hermes chat --provider {{provider}}"

config:
  - desc: "Show current config values:"
    cmd: "hermes config show"
  - desc: "Print the .env file path:"
    cmd: "hermes config env-path"
  - desc: "Check for missing or stale config:"
    cmd: "hermes config check"

curator:
  - desc: "Show curator status and skill stats:"
    cmd: "hermes curator status"
  - desc: "Take a manual snapshot of skills:"
    cmd: "hermes curator backup"
  - desc: "Trigger a review (add --dry-run for preview):"
    cmd: "hermes curator run"
  - desc: "Pin or unpin a skill:"
    cmd: "hermes curator pin/unpin {{skill}}"
  - desc: "List or restore archived skills:"
    cmd: "hermes curator list-archived/restore {{skill}}"

gateway:
  - desc: "Show service status:"
    cmd: "hermes gateway status"
  - desc: "List all profiles and gateway status:"
    cmd: "hermes gateway list"
  - desc: "Run the gateway in the foreground:"
    cmd: "hermes gateway run"
  - desc: "Start, stop, or restart the service (--all for every profile):"
    cmd: "hermes gateway start/stop/restart"

insights:
  - desc: "Analyze the last 30 days (default):"
    cmd: "hermes insights"
  - desc: "Analyze the last 7 days:"
    cmd: "hermes insights --days 7"
  - desc: "Filter by messaging source (e.g. cli or telegram):"
    cmd: "hermes insights --source {{source}}"

plugins:
  - desc: "List installed plugins with status:"
    cmd: "hermes plugins list"

send:
  - desc: "List configured targets:"
    cmd: "hermes send --list"
  - desc: "Send a message to a target:"
    cmd: "hermes send --to {{target}} \"{{message}}\""
  - desc: "Send a file:"
    cmd: "hermes send --to {{target}} --file {{path}}"

memory:
  - desc: "Show current memory provider config:"
    cmd: "hermes memory status"
  - desc: "Interactive provider selection and configuration:"
    cmd: "hermes memory setup"

moa:
  - desc: "List configured MoA presets:"
    cmd: "hermes moa list"

model:
  - desc: "Interactive provider and model selector:"
    cmd: "hermes model"
  - desc: "Switch to a pre-configured model (permanent):"
    cmd: "hermes model zai:glm-5"

profile:
  - desc: "List all profiles:"
    cmd: "hermes profile list"
